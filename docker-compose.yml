version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ames-housing-app
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - PYTHONUNBUFFERED=1
    ports:
      - "8501:8501"
    volumes:
      - ./mlruns:/app/mlruns
      - ./reports:/app/reports
    command: streamlit run streamlit_app.py --server.address=0.0.0.0 --server.port=8501

  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ames-housing-trainer
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - PYTHONUNBUFFERED=1
    volumes:
      - ./mlruns:/app/mlruns
      - ./reports:/app/reports
    command: python main.py
    profiles:
      - train

  mlflow-ui:
    image: ghcr.io/mlflow/mlflow:v2.22.1
    container_name: ames-housing-mlflow-ui
    working_dir: /app
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///app/mlruns

